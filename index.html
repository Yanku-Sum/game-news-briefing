게임을 제친 이례적 흥행 사례로 업계의 주목을 받고 있습니다.","source":"ZDNet Korea"}],"games":[{"title":"'더 마운드: 오멘 오브 크툴루' 오늘 정식 출시","url":"https://news.xbox.com/en-us/2026/07/13/the-mound-omen-of-cthulhu-sanity/","blurb":"4인 협동 러브크래프트풍 익스트랙션 게임 '더 마운드: 오멘 오브 크툴루'가 7월 15일 PS5·엑스박스 시리즈·PC로 출시됐습니다. HUD 없이 광기·환각으로 플레이어를 속이는 '정신력' 시스템이 특징이며, 스팀 넥스트 페스트에서 60만 위시리스트를 모아 출시일 15% 할인 보상을 이끌어냈습니다.","source":"Xbox Wire"},{"title":"'붕괴: 스타레일' 4.4 버전 '적막이 깃든 순간, 울리는 경적' 업데이트","url":"https://www.khgames.co.kr/news/articleView.html?idxno=306076","blurb":"호요버스의 '붕괴: 스타레일'이 7월 15일 4.4 버전을 적용했습니다. 신규 5성 캐릭터 '히메코 노바'가 추가되고 '페이트/스테이 나이트' 2차 콜라보가 진행되며, 7월 24일부터는 길가메시·아처 중 한 명을 무료로 선택할 수 있는 이벤트도 예고됐습니다.","source":"경향게임스"},{"title":"스마일게이트 '에픽세븐', 여름 시즌 업데이트…신규 영웅 '심해의 눈 후미르'","url":"https://www.kdfnews.com/news/articleView.html?idxno=184615","blurb":"스마일게이트의 모바일 턴제 전략 RPG '에픽세븐'이 여름 시즌 업데이트를 시작하며 신규 한정 영웅 '심해의 눈 후미르'와 특별 서브 스토리, 대규모 혜택 이벤트 '에픽대시'를 공개했습니다. 후미르는 7월 16일까지만 획득할 수 있습니다.","source":"한국면세뉴스"},{"title":"넷마블 '킹 오브 파이터 AFK', 여름 이벤트 '아쿠아 스플래시' 진행","url":"https://www.kdfnews.com/news/articleView.html?idxno=184615","blurb":"넷마블의 캐릭터 수집형 AFK 모바일 RPG '킹 오브 파이터 AFK'가 여름 콘셉트의 레전드 시즈널 파이터 '쿨라 다이아몬드(아쿠아 스플래시)'를 추가했습니다. 메인 이벤트는 7월 2일부터 15일까지 진행됩니다.","source":"한국면세뉴스"}]},{"date":"2026-07-14","lede":"베데스다 게임 스튜디오 노조가 엑스박스發 440명 감원에 반발해 7월 15일 미국 전역에서 '데브를 지켜라(Save Our Devs)' 시위를 예고했고, 팬덤 산하 게임스팟도 상거래팀 전원과 임원을 해고하며 구조조정 여파가 이어졌습니다. e스포츠에서는 한화생명e스포츠가 창단 첫 MSI 우승을 달성하며 LCK 3년 연속 정상에 올랐고, 넥슨 네오플은 던파 IP 기반 헌팅 액션 '프로젝트DM' 개발을 종료했습니다. 신작 쪽에서는 넷마블 '아스달 연대기' 신규 서버 '뉴 월드'가 오늘 열렸고, 안나푸르나의 퍼즐 어드벤처 '디-토피아'와 정체를 숨긴 장수를 추리하는 전략 게임 '블라인드삼국'이 나란히 출시됐습니다.","industry":[{"title":"베데스다 노조, 엑스박스 감원 반발 '데브를 지켜라' 전국 시위 예고","url":"https://www.windowscentral.com/gaming/zenimax-bethesda/bethesda-union-members-are-protesting-xboxs-layoffs-with-a-save-our-devs-march-next-week-after-440-zenimax-cuts","blurb":"베데스다 게임 스튜디오·제니맥스 온라인 노조가 엑스박스발 구조조정으로 440명이 해고된 데 반발해 7월 15일 몬트리올·록빌·오스틴·댈러스 등 4개 지역 스튜디오 앞에서 '데브를 지켜라(Save Our Devs)' 행진을 벌인다고 밝혔습니다. 노조는 이번 감원이 해마다 반복되는 스트레스라며 강하게 반발했습니다.","source":"Windows Central"},{"title":"팬덤, 게임스팟 상거래팀 전원 해고…임원도 정리","url":"https://aftermath.site/gamespot-layoffs-july-2026/","blurb":"게임스팟 모회사 팬덤이 7월 9일 게임스팟 상거래팀 직원 4명과 프리랜서 5명을 전원 해고하고 게임·엔터테인먼트 담당 부사장 크리스 그랜트도 내보냈습니다. 총상해로 병가 중이던 딜 담당 에디터까지 감원 대상에 포함돼 논란이 일고 있습니다.","source":"Aftermath"},{"title":"한화생명e스포츠, 창단 첫 MSI 우승…LCK 3년 연속 정상","url":"https://www.khgames.co.kr/news/articleView.html?idxno=306306","blurb":"한화생명e스포츠가 7월 12일 대전에서 열린 'MSI 2026' 결승에서 LPL 1번 시드 빌리빌리 게이밍(BLG)을 세트 스코어 3대2로 꺾고 창단 첫 MSI 우승을 차지했습니다. 이로써 LCK는 2024·2025년 젠지에 이어 3년 연속 MSI 정상에 올랐습니다.","source":"경향게임스"},{"title":"넥슨 네오플, 던파 기반 헌팅 액션 '프로젝트DM' 개발 종료","url":"https://www.gamemeca.com/en/view.php?gid=1777667","blurb":"넥슨 자회사 네오플이 언리얼 엔진5 기반으로 개발 중이던 던전앤파이터 IP 활용 헌팅 액션 '프로젝트DM' 제작을 종료하고 개발팀을 해산했습니다. 강화된 내부 심사 기준을 충족하지 못한 것이 원인으로 풀이되며, 던파 IP 다각화 전략에도 일부 수정이 불가피할 전망입니다.","source":"게임메카"},{"title":"국립중앙도서관, '단종 한국 게임, 다시 켜다' 기획전 개최","url":"https://www.gamemeca.com/view.php?gid=1774598","blurb":"국립중앙도서관이 플랫폼 단종으로 사라질 위기에 놓인 초기 국산 게임을 디지털 문화유산으로 조명하는 기획전 '단종 한국 게임, 다시 켜다'를 7월부터 2027년 5월까지 연다고 밝혔습니다. 전시는 '단종된 한국 게임들', '게임을 지키는 사람들' 등 6개 주제 공간으로 구성됩니다.","source":"게임메카"},{"title":"게임프리크, 도쿄게임쇼 2026에 사상 첫 단독 부스 출품","url":"https://bbs.ruliweb.com/nin/board/300004/read/2357782","blurb":"포켓몬 개발사 게임프리크가 9월 열리는 도쿄게임쇼 2026에 창사 이래 처음으로 단독 부스를 낸다고 발표했습니다. 다만 포켓몬 시리즈는 전시되지 않으며, 8월 출시 예정 신작 '비스트 오브 리인카네이션' 등이 소개될 것으로 보입니다.","source":"루리웹"},{"title":"'어크 블랙 플래그 리싱크드', 스팀 평가 반전 성공하며 매출 1위","url":"https://www.inven.co.kr/webzine/news/?news=318363","blurb":"유비소프트의 '어쌔신 크리드: 블랙 플래그 리싱크드'가 출시 첫날 대체로 부정적이었던 스팀 평가를 대체로 긍정적으로 반전시키며 스팀 매출 1위에 올랐습니다. 최고 동시접속자 9만 9,451명으로 시리즈 역대 최고 기록도 세웠습니다.","source":"인벤"}],"games":[{"title":"넷마블 '아스달 연대기', 유료 뽑기 없앤 신규 서버 '뉴 월드' 오늘 오픈","url":"https://www.khgames.co.kr/news/articleView.html?idxno=306041","blurb":"넷마블의 MMORPG '아스달 연대기'가 7월 14일 유료 소환 뽑기와 패키지 상품을 전면 제거한 신규 서버 '뉴 월드'를 열었습니다. 전설 등급 정령·탑승물까지 필드 파밍만으로 획득하도록 설계됐으며, 사전등록 참여자에게는 올 파밍 세트가 지급됩니다.","source":"경향게임스"},{"title":"안나푸르나 퍼즐 어드벤처 '디-토피아', 오늘 글로벌 정식 출시","url":"https://www.inven.co.kr/webzine/news/?news=315723","blurb":"안나푸르나 인터랙티브가 퍼블리싱한 마루미투 게임즈의 퍼즐 어드벤처 '디-토피아'가 7월 14일 PC·스위치·스위치2·PS5·엑스박스로 정식 출시됐습니다. AI가 행복을 관리하는 미래 사회를 배경으로 시설 관리자가 되어 주민들의 문제를 해결하는 선택형 스토리가 특징입니다.","source":"인벤"},{"title":"정체 숨긴 장수 추리하는 삼국지 전략 게임 '블라인드삼국' 스팀 얼리액세스 출시","url":"https://store.steampowered.com/app/4549610/Three_Kingdoms__Alias/?l=koreana","blurb":"플로트릭이 개발한 턴제 삼국지 전략 시뮬레이션 '블라인드삼국'이 7월 14일 스팀 얼리액세스로 출시됐습니다. 장수의 실명이 가려진 채 성씨·능력치·전공 등 단서만으로 정체를 추리해야 하는 독특한 방식이 특징입니다.","source":"Steam"},{"title":"'에이펙스 레전드', 사이버펑크: 엣지러너 콜라보 시작","url":"https://www.inven.co.kr/webzine/news/?news=318188","blurb":"일렉트로닉 아츠와 리스폰 엔터테인먼트가 '에이펙스 레전드'와 애니메이션 '사이버펑크: 엣지러너'의 콜라보레이션을 7월 14일부터 8월 4일까지 진행합니다. 나이트 시티를 재현한 신규 와일드카드 모드와 사이버웨어 능력, 신화급 스키피 스킨 등이 추가됩니다.","source":"인벤"},{"title":"'던전앤파이터 모바일', 이누야샤 컬래버·신규 직업 '아처' 하반기 로드맵 공개","url":"https://www.gamemeca.com/view.php?gid=1777717","blurb":"넥슨의 '던전앤파이터 모바일'이 하반기 콘텐츠 로드맵을 공개하며 애니메이션 '이누야샤'와의 컬래버레이션과 신규 직업 '아처' 추가 계획을 밝혔습니다.","source":"게임메카"}]},{"date":"2026-07-13","lede":"넥써쓰가 626억 원 규모의 원스토어 인수를 완료하며 게임허브 플랫폼 전환에 속도를 냈고, 라인게임즈는 8년 연속 적자와 자본잠식 끝에 전사 희망퇴직에 돌입했습니다. 소니는 2028년 1월부터 PS 신작의 실물 디스크 생산을 전면 중단한다고 확정했고, 엑스박스는 '사우스 오브 미드나이트' 개발사 독립과 닌자 시어리·언데드 랩스 매각 등 스튜디오 재편 최종 라인업을 공개했습니다. 신작 쪽에서는 '알케론'과 '라그나로크 제로: 글로벌'이 CBT·OBT를 이어가는 가운데, 마피아42 개발사 팀42의 12년 만의 신작 '슬라임의 세계' 플레이 트레일러가 공개됐습니다.","industry":[{"title":"넥써쓰, 원스토어 인수 완료…626억에 지분 89.03% 확보","url":"https://www.edaily.co.kr/News/Read?newsId=05077446645486640&mediaCodeNo=257","blurb":"넥써쓰가 SK스퀘어, 네이버, 크래프톤 등으로부터 원스토어 지분 89.03%를 626억 원에 인수하는 절차를 완료했습니다. 국내에 3,800만 대 이상 설치된 원스토어를 단순 앱마켓을 넘어 블록체인 기반 '게임허브'로 확장한다는 계획입니다.","source":"이데일리"},{"title":"'자본잠식' 라인게임즈, 경영난에 전사 희망퇴직 단행","url":"https://www.gamemeca.com/en/view.php?gid=1777422","blurb":"라인게임즈가 8년 연속 적자와 자본잠식 상태를 벗어나지 못하며 전 직군을 대상으로 이달 말까지 희망퇴직 신청을 받습니다. 퇴직이 확정되면 3개월치 급여와 이직지원금이 지급되며, 지난달 최고전략책임자에 이어 조동현 공동대표까지 사의를 표명하는 등 경영진 이탈도 이어지고 있습니다.","source":"게임메카"},{"title":"소니, 28년 1월부터 PS 신작 '실물 디스크' 생산 중단","url":"https://www.inven.co.kr/webzine/news/?news=318046","blurb":"소니인터랙티브엔터테인먼트가 2028년 1월부터 플레이스테이션 신작 게임의 실물 디스크 생산을 전면 중단한다고 발표했습니다. 디지털 다운로드 비중이 80%에 달하는 상황을 반영한 결정으로, PS3와 PS비타의 스토어 서비스도 단계적으로 종료됩니다.","source":"인벤"},{"title":"Here's The New Lineup Of Xbox Game Studios For July 2026 Onwards","url":"https://www.purexbox.com/news/2026/07/heres-the-new-lineup-of-xbox-game-studios-for-july-2026-onwards","blurb":"지난주 발표된 엑스박스 구조조정에 따라 '사우스 오브 미드나이트' 개발사가 독립 스튜디오로 분리되기로 합의했고, 닌자 시어리와 언데드 랩스는 새 주인을 찾아 매각될 예정입니다. 아케인은 프랑스 노동법상 노동자평의회 협의 절차가 남아있어 거취가 아직 불투명한 상태입니다.","source":"Pure Xbox"},{"title":"Scopely to Acquire Majority Stake in 'Pixel Flow!' Game Studio","url":"https://variety.com/2026/gaming/news/scopely-pixel-flow-gaming-news-roundup-1236666782/","blurb":"스코플리가 튀르키예 스튜디오 룸 게임즈의 지분 과반을 인수하며 회사 가치를 10억 달러로 평가했습니다. 대형 스튜디오 구조조정이 이어지는 와중에도 중견 개발사를 겨냥한 인수합병은 활발히 이뤄지고 있음을 보여주는 사례입니다.","source":"Variety"},{"title":"전국 14개교 참가 '2026 스쿨리그' 출정식, 11일 대전서 개최","url":"https://www.inven.co.kr/webzine/news/?news=318193","blurb":"한국e스포츠협회가 국내 최초의 학교 대항전 정기 리그 '2026 스쿨리그' 출정식을 7월 11일 대전이스포츠경기장에서 열었습니다. LoL 미드 시즌 인비테이셔널(MSI) 부대행사로 진행됐으며, 2학기 정규시즌은 8월 말 개막해 11월까지 이어집니다.","source":"인벤"}],"games":[{"title":"롭 팔도의 PvP 액션 게임 '알케론', 7월 16일 CBT 시작","url":"https://www.inven.co.kr/webzine/news/?news=318275","blurb":"드림에이지와 본파이어 스튜디오가 개발 중인 PvP 액션 게임 '알케론'이 7월 16일부터 27일까지 글로벌 CBT를 진행합니다. 3대3 아레나 모드 '스파이어스'가 상시 개방되며, 18~20일에는 핵심 경쟁 모드 '어센션'도 체험할 수 있습니다.","source":"인벤"},{"title":"'서든어택: 제로 포인트', 파이널 CBT 7월 13일 종료","url":"https://www.inven.co.kr/webzine/news/?news=318161","blurb":"넥슨게임즈가 개발 중인 서든어택 리부트작 '서든어택: 제로 포인트'의 스팀 파이널 CBT가 7월 9일부터 13일까지 진행됐습니다. 이번 테스트는 지역 제한으로 국내 이용자는 참여할 수 없었으며, 정식 출시일은 아직 공개되지 않았습니다.","source":"인벤"},{"title":"'라그나로크 제로: 글로벌', 2차 OBT서 UGC 시스템 'RO Factory' 공개","url":"https://www.khgames.co.kr/news/articleView.html?idxno=305597","blurb":"그라비티 게임 유나이트의 PC MMORPG '라그나로크 제로: 글로벌'이 7월 7일부터 15일까지 동남아·유럽·오세아니아 지역 대상 2차 OBT를 진행 mes/2026/07/04/ea-college-football-27-review-the-good-the-bad-and-the-bottom-line/","blurb":"EA 스포츠 '칼리지 풋볼 27'이 7월 9일 PS5·엑스박스 시리즈·PC로 전 세계 동시 출시되며, 시리즈 최초로 PC(스팀·EA 앱·에픽)를 지원합니다. 다이나믹 날씨와 신규 중계 연출, 강화된 다이나스티 모드가 호평받았으나 얼티밋 팀 모드의 잦은 로딩 오류는 아쉬운 점으로 꼽혔습니다.","source":"Forbes"}]},{"date":"2026-07-08","lede":"엑스박스 신임 CEO 아샤 샤르마가 대규모 구조조정의 책임을 전임 필 스펜서의 확장 전략으로 돌리며 '킹'과 '모장'을 직속 보고 체계로 편입했고, 나이언틱 게임사업부는 인수 1년 만에 '스코플리 익스플로어'로 개명했습니다. 국내에서는 엔씨의 '저니 오브 모나크'가 서비스 종료를 예고했고 차이나조이 2026 티켓 예매가 시작되는 등 여름 성수기 업계 움직임이 분주한 가운데, 신작 쪽에서는 로스트아크 신규 클래스 '차원술사'가 출시됐고 '프로야구 스피리츠 2026'·'파이널 판타지 10/10-2 HD 리마스터' 스위치2판이 각각 7월 16일, 23일 출시를 확정했습니다.","industry":[{"title":"Xbox CEO Asha Sharma points the finger at Phil Spencer's strategy for yesterday's sweeping layoffs: 'We simply spread ourselves too thin'","url":"https://www.pcgamer.com/gaming-industry/xbox-ceo-asha-sharma-points-the-finger-at-phil-spencers-strategy-for-yesterdays-sweeping-layoffs-we-simply-spread-ourselves-too-thin/","blurb":"엑스박스 신임 CEO 아샤 샤르마가 대규모 구조조정의 원인으로 전임 필 스펜서 시절의 무리한 확장 전략을 지목하며 '우리는 스스로를 너무 얇게 퍼뜨렸다'고 밝혔습니다. 3,200명 감원과 4개 스튜디오 매각을 정당화하는 발언으로 해석됩니다.","source":"PC Gamer"},{"title":"How Microsoft's new Xbox chief is resetting one of the company's most iconic brands","url":"https://fortune.com/2026/07/07/xbox-ceo-asha-sharma-reset-layoffs-microsoft-gaming/","blurb":"포춘이 엑스박스 신임 수장 아샤 샤르마의 '리셋' 전략을 조명하며, 콘솔 사업 수익성 회복과 조직 슬림화가 최우선 과제로 제시됐다고 보도했습니다. 관리 계층을 최대 3~5단계로 줄이는 개편도 함께 추진됩니다.","source":"Fortune"},{"title":"King and Mojang to report directly to Xbox CEO Asha Sharma after company \"reset\"","url":"https://www.pocketgamer.biz/king-and-mojang-to-report-directly-to-xbox-ceo-asha-sharma-after-company-reset/","blurb":"구조조정 이후 캔디크러시 개발사 '킹'과 마인크래프트 개발사 '모장'이 아샤 샤르마 엑스박스 CEO에게 직접 보고하는 체계로 개편됩니다. 핵심 IP에 대한 의사결정 속도를 높이려는 조치로 풀이됩니다.","source":"PocketGamer.biz"},{"title":"니안틱 게임사업부, 인수 1년 만에 '스코플리 익스플로어'로 개명","url":"https://www.khgames.co.kr/news/articleView.html?idxno=306136","blurb":"스코플리가 지난해 35억 달러에 인수한 나이언틱 게임 사업부의 명칭을 '스 <script id="analysis-data" type="application/json">[{"date":"2026-07-20","game":"마비노기 모바일 (Mabinogi Mobile)","hook":"2025년 3월 PC 원작 '마비노기'의 세계관을 모바일로 재해석해 출시된 이후 꾸준한 신규 레이드·업데이트로 화제를 유지해 왔지만, 최근에는 콘텐츠보다 과금 논란(웨카 경매장 철회, 고가의 패션 뽑기·합성 시스템)으로 더 자주 이름이 오르내리는 게임입니다.","coreLoop":"필드 탐험·퀘스트 수행 → '우연한 만남' 크로스서버 매칭으로 다른 유저와 자동 파티 결성 → 사냥·던전 클리어로 성장 재화 획득 → 장비 강화·클래스 체인지로 전투력 상승 → 다음 구간 진행, 이 순환이 반복됩니다. 전투 외에도 낚시·요리·채집·제작 같은 비전투 생활 콘텐츠가 별도 루프로 병행되며, 성장과 무관하게 여유롭게 즐길 수 있는 서브 루프로 설계돼 있습니다.","growthCurve":"전투 클래스는 무기를 바꿔 들면 스킬셋이 자동 전환되는 '클래스 체인지 시스템'으로, 캐릭터 하나로 여러 역할을 오가며 성장 곡선을 완만하게 유지합니다. 장비 강화·각인 등 전투력 성장 축과는 별개로 생활 스킬 숙련도가 독립적으로 쌓이는 이중 곡선이 특징이며, 초반에는 메인 스토리를 따라가는 것만으로 자연스럽게 성장하지만 최상위 구간으로 갈수록 확률형 장비 뽑기·합성 의존도가 급격히 높아지는 점이 밸런스 논쟁의 원인이 되고 있습니다.","funMechanics":"PC 원작 특유의 '따뜻한 커뮤니티' 감성을 모바일에 그대로 옮긴 것이 핵심 재미입니다. '우연한 만남' 시스템은 파티 보너스를 주지 않는 대신 순수하게 우연한 사회적 교류를 유도하고, 경쟁보다 힐링·꾸미기·생활 콘텐츠에 무게를 둬 코어 MMO 유저가 아니어도 부담 없이 즐길 수 있는 저강도 재미를 제공합니다.","benchmarks":"① 하나의 캐릭터로 여러 클래스를 오가게 하는 '클래스 체인지'로 로스터 관리 피로도를 낮춘 설계. ② 전투와 무관한 생활 콘텐츠를 독립된 성장 축으로 분리해 비경쟁 유저층까지 넓힌 포지셔닝. ③ '웨카 경매장'을 출시 일주일 만에 전면 철회한 사례는, 사전 검증 없이 유료 재화 기반 거래 시스템을 내놓았을 때 등급분류·소비자 신뢰 리스크가 얼마나 빨리 터질 수 있는지 보여주는 반면교사입니다. ④ 수익 버그는 즉시 수정하고 유저 경험 버그는 방치하는 이중잣대 운영이 커뮤니티 신뢰를 얼마나 빠르게 갉아먹는지도 함께 참고할 지점입니다.","businessModel":"부분유료화 기반으로, 패션(외형) 아이템 뽑기와 에픽→전설 합성 시스템이 핵심 매출원입니다. 패션 뽑기는 부위별 천장이 약 20만 원으로 4부위를 채우면 사실상 80만 원 규모이며, 확률 20%의 합성 시스템까지 더해져 업계 평균 대비 과금 강도가 높다는 평가를 받습니다. 이 외 주간 구매 패키지에 성장 재화 상자를 포함시키는 등 스펙업 성격의 상품도 점차 늘고 있어, '힐링 게임' 포지셔닝과 과금 설계 사이의 괴리가 논란의 핵심입니다.","onboarding":"여섯 가지 견습 클래스 중 하나로 시작해 메인 스토리를 따라가면 자연스럽게 시스템을 익히도록 구성돼 있고, 크로스서버 매칭 덕분에 초반부터 다른 유저와 자연스럽게 어울리며 학습하게 됩니다. 다만 생활 콘텐츠·클래스 체인지·이중 뽑기 시스템 등 정보량이 많아, 온보딩 자체는 완만해도 '제대로 하려면' 알아야 할 시스템이 빠르게 늘어나는 편입니다.","targetUser":"PC 마비노기의 기존 팬덤과, 경쟁보다 힐링·꾸미기·소통을 원하는 라이트~미들 MMO 유저를 동시에 겨냥합니다. 실제로 10~20대 이용자 비중이 70%에 달한다는 조사 결과처럼 젊은 층, 특히 꾸미기·감성 콘텐츠에 반응하는 유저층에서 강세를 보이는 포지셔닝입니다.","community":"크로스서버 실시간 매칭('우연한 만남')과 생활 콘텐츠를 통한 자연스러운 교류가 커뮤니티 형성의 핵심 장치입니다. 다만 최근에는 아카라이브 등 커뮤니티에서 과금 논란과 버그 대응 이중잣대에 대한 비판 여론이 활발히 공유되며, 긍정적 교류 못지않게 운영 신뢰에 대한 집단적 문제 제기가 커뮤니티의 주요 화두가 되고 있습니다.","links":[{"title":"10-20대가 70%, MMO 장르 이끈 마비노기 모바일","url":"https://www.gamemeca.com/view.php?gid=1767354","source":"게임메카"},{"title":"[현장] '1100억 투입' 마비노기 모바일, 기본도 못 지킨 치명적 버그에 신뢰 와르르","url":"https://alphabiz.co.kr/news/view/1065607785515696","source":"알파경제"},{"title":"[게임 맥락읽기] '투명한 BM' 압박 가중… 넥슨 웨카 사태가 남긴 교훈","url":"https://www.pointdaily.co.kr/news/articleView.html?idxno=284526","source":"포인트데일리"},{"title":"마비노기 모바일/논란 및 사건 사고","url":"https://namu.wiki/w/%EB%A7%88%EB%B9%84%EB%85%B8%EA%B8%B0%20%EB%AA%A8%EB%B0%94%EC%9D%BC/%EB%85%BC%EB%9E%80%20%EB%B0%8F%20%EC%82%AC%EA%B1%B4%20%EC%82%AC%EA%B3%A0","source":"나무위키"}]},{"date":"2026-07-15","game":"멧챠 카멜레온 (MECCHA CHAMELEON)","hook":"일본 2인 개발팀이 두 달 만에 만든 6,500원짜리 숨바꼭질 게임이 광고비 한 푼 없이 입소문만으로 출시 한 달 만에 1,500만 장을 팔며 오버워치·에이펙스 레전드의 동시접속자까지 앞질러, 2026년 가장 화제가 되고 있는 인디 게임입니다.","coreLoop":"라운드 시작 → 하이더(숨는 자)는 흰 몸에 색을 칠해 주변 환경(벽·소품·바닥 텍스처)에 위장 → 시커(찾는 자)는 제한시간 안에 모든 하이더를 색출 → 라운드 종료 후 팀 교대, 이 순환이 반복됩니다. 색상 피커, 채도·명도 조절, 브러시 종류·크기, 스포이드까지 갖춘 정교한 페인팅 도구가 핵심 인터페이스이며, 완벽하게 위장했다가 숨소리나 사소한 움직임으로 발각되는 순간이 매 라운드 반복되는 텐션의 근원입니다.","growthCurve":"전통적인 레벨·장비 성장이 전혀 없습니다. 대신 (1) 맵 자체의 난이도(단순한 단색 배경 → 복잡한 패턴·소품이 뒤섞인 맵)로 자연스러운 페이싱을 만들고, (2) 플레이어의 위장·수색 '숙련도'(어디에 숨을지, 어떤 색·패턴 조합이 통하는지 감각적으로 학습하는 것)가 유일한 성장축이며, (3) 2~24인 인원 구성과 4개 게임모드 조합으로 매 세션마다 난이도가 재구성됩니다. 캐릭터가 아니라 '유저의 눈썰미'가 성장하는 구조입니다.","funMechanics":"재미의 핵심은 완벽한 위장 뒤 사소한 실수로 발각되는 반전 코미디와, 그 장면이 그대로 15초 안팎의 숏폼 클립으로 편집 가능한 '밈 생성 구조'입니다. 별다른 서사나 목표 없이 '몰래 숨기 vs 찾기'라는 원초적 놀이 본능만으로 승부하며, 위장에 성공했다는 안도감과 들켰을 때의 허탈한 웃음이 반복적으로 교차하는 감정 곡선이 몰입을 만듭니다.","benchmarks":"① 광고비 0원으로 대형 프랜차이즈의 동시접속자를 추월한 사례 — 게임 자체가 '숏폼에 최적화된 웃긴 장면'을 구조적으로 생산하도록 설계되어 마케팅을 대체했습니다. ② 친구 목록·랭크·길드 등 소셜 인프라를 의도적으로 배제해 '가벼운 파티 게임'이라는 포지셔닝을 지킨 미니멀 설계. ③ 스팀 창작마당을 조기 지원해 유저 제작 맵으로 콘텐츠 수명을 외주화한 라이브 운영. ④ 2인 개발·2개월 제작이라는 초저비용 구조가 6,500원 가격에도 압도적 수익률을 만들어낸 인디 개발 사례.","businessModel":"완전 프리미엄 단일 구매(5.99달러, 국내 약 6,500원) 모델로, DLC·시즌패스·인앱결제가 전무합니다. 마케팅 비용을 전혀 쓰지 않아 매출 대부분이 순이익으로 직결되는 초고효율 구조이며, 향후 창작마당 관련 유료화나 코스메틱 도입 가능성이 거론되지만 현재까지는 순수 판매 모델을 유지하고 있습니다.","onboarding":"규칙은 '숨어라' 또는 '찾아라' 한 문장으로 설명될 만큼 단순합니다. 색칠 도구도 직관적인 UI(색상 피커+스포이드)로 구성돼 별도 튜토리얼 없이 첫 판부터 바로 이해되며, 초반부터 웃긴 상황이 발생해 학습보다 '체험'으로 몰입시킵니다. 이 낮은 진입장벽이 숙련된 게이머는 물론 비게이머 시청자까지 자연스럽게 끌어들이는 핵심 요인입니다.","targetUser":"정교한 조작이나 학습이 필요 없어, 친구·크루와 함께 웃고 떠들기 위한 캐주얼·파티 플레이어와 숏폼 콘텐츠 소비자(틱톡·유튜브 쇼츠 시청층)를 동시에 겨냥합니다. 스트리머의 다인 합방을 통해 비게이머 시청자가 자연스럽게 구매·유입되는 '보는 재미 → 하는 재미' 전환 구조가 기존 파티 게임과의 차별화 포인트입니다.","community":"친구 목록·랭크 시스템을 배제한 대신 최대 24인 동시 플레이와 스팀 창작마당 커스텀 맵으로 자생적 콘텐츠 생태계를 유도합니다. 트위치·유튜브 스트리머들의 '합방'(다인 방송 콜라보)이 확산의 최대 동력이며, 그 방송을 본 시청자가 직접 게임을 구매해 다음 합방에 참여하는 선순환이 커뮤니티 성장의 핵심 고리입니다.","links":[{"title":"Two Developers, $15 Million in Days: How 'Meccha Chameleon' Became Steam's Breakout Hit","url":"https://finance.biggo.com/news/95ed8469-2860-4bfc-82db-792f7aa936a8","source":"BigGo Finance"},{"title":"6500원짜리 숨바꼭질에 빠진 지구촌…1인 개발 게임 '멧챠 카멜레온' 대박 신화","url":"https://www.newsis.com/view/NISX20260706_0003696890","source":"뉴시스"},{"title":"두 명이 일군 700만장 판매 기적...'멧챠 카멜레온'은 어떻게 세계를 홀렸나","url":"https://zdnet.co.kr/view/?no=20260625090756","source":"ZDNet Korea"},{"title":"재미 치트키 탄생, '멧챠 카멜레온' 합방 게임 돌풍","url":"https://www.gameple.co.kr/news/articleView.html?idxno=215903","source":"게임플"},{"title":"The viral hit of 2026 has sold 15 million copies in a month on Steam, costs $5, and was made by 2 people","url":"https://www.windowscentral.com/gaming/the-viral-hit-of-2026-has-sold-15-million-copies-in-a-month-on-steam-costs-usd5-and-was-made-by-2-people","source":"Windows Central"}]},{"date":"2026-07-14","game":"발더스 게이트 3 (Baldur's Gate 3)","hook":"출시 3년차에도 스팀 최고 동시접속자 11만 명을 새로 찍고 누적 판매 2,000만 장을 돌파하며, DLC나 후속작 없이도 여전히 화제성을 유지하고 있는 CRPG의 기준점입니다.","coreLoop":"탐험(맵의 모든 구역에서 대화·상호작용 오브젝트 발견) → 대화·전투 중 매 순간 주사위 판정에 따른 선택과 결과 분기 → 파티원 관계·세계 반응의 변화 → 다음 지역으로 이동, 이 순환이 반복됩니다. 전투는 턴제 D&D 규칙을 그대로 구현하되 환경 요소(높이차, 기름·불, 밀치기)를 적극 활용하는 전술 퍼즐에 가깝고, 하나의 문제(자물쇠, NPC 설득, 장애물)에 전투·설득·잠입·마법 등 여러 해법이 동시에 열려 있는 것이 루프의 핵심입니다.","growthCurve":"성장은 (1) 캐릭터 레벨(12레벨 상한, 클래스·서브클래스 특성 해금), (2) 장비·아이템 발견을 통한 빌드 다양화, (3) 파티원 개인 서사(승인도·관계) 진행이라는 3중 곡선으로 설계됐습니다. 1막은 저레벨 D&D 특유의 취약함(체력 낮음, 실패 확률 높음)을 그대로 노출해 긴장감을 주고, 2~3막으로 갈수록 스킬 조합이 폭발적으로 늘어나며 난이도보다 '가능성'이 성장의 쾌감을 만듭니다. 커스텀 난이도·전술가 모드 등으로 유저가 직접 곡선을 조절하게 열어둔 것도 특징입니다.","funMechanics":"재미의 핵심은 '내가 상상한 해결책이 실제로 게임 시스템 안에서 작동한다'는 시스템적 자유도입니다. 대화 중 아무 때나 주사위를 굴려 결과가 갈리는 텐션, 우호도가 아니라 '개연성'으로 파티원이 반응하는 서사, 협동 전투에서 파티원 배치·환경 활용이 곧 전략이 되는 구조가 결합되어 매 판이 다른 이야기를 만들어냅니다.","benchmarks":"① 하나의 문제에 여러 정답을 동시에 허용하는 '시스템 기반 서사' 설계. ② 액트 단위로 완전히 새로운 지역·톤을 제공해 긴 개발·플레이 기간에도 지치지 않게 만든 콘텐츠 페이싱. ③ 3년의 얼리액세스 동안 커뮤니티 피드백을 정식 패치로 반영하며 신뢰를 쌓은 라이브 운영. ④ 상업적으로 성공한 뒤에도 '무리한 확장보다 완결'을 택한 브랜드 관리(DLC·후속작 대신 신규 IP로 전환).","businessModel":"완전 프리미엄 단일 구매 모델로, 출시 이후 부분유료화·시즌패스·마이크로트랜잭션을 전혀 도입하지 않았습니다. 수익은 ① 본편 패키지 판매(디럭스 에디션 포함) ② 플랫폼별 이식(PS5·Xbox·Mac) 신규 판매 ③ 스팀·GOG 등 지속 판매에서 발생하며, DLC나 후속작으로 수명을 늘리는 대신 완결 후 신규 IP 개발로 넘어가는 '한 작품 완주형' 수익 전략을 택했습니다.","onboarding":"러닝커브는 의도적으로 가파릅니다. D&D 5판 규칙을 그대로 노출하기 때문에 초반 진입장벽이 높지만, '커스텀 난이도'로 전투 난도를 낮추고 튜토리얼을 인트로 전투 시퀀스에 자연스럽게 녹여 규칙보다 상황으로 학습하게 유도합니다. 다만 클래스·주문 목록의 절대량이 많아, 숙련된 TRPG 유저와 완전 초심자 간 학습 속도 차이가 뚜렷합니다.","targetUser":"전통 CRPG·TRPG 팬을 코어 타겟으로 하되, 하이 퀄리티 시네마틱과 로맨스 서사로 콘솔·캐주얼 RPG 유저층까지 넓게 흡수했습니다. '규칙은 복잡해도 이야기는 누구나 즐길 수 있다'는 포지셔닝으로 D&D를 모르는 유저까지 시장을 확장한 것이 시리즈 역사상 최대 흥행의 배경입니다.","community":"최대 4인 협동 플레이와 파티원마다 다른 서사 분기가 맞물려, 플레이어들이 서로 다른 선택·결말을 비교·공유하는 문화가 커뮤니티(레딧, 유튜브)에서 자연스럽게 형성됩니다. 라리안은 출시 후에도 대규모 무료 패치(에필로그 추가 등)를 지속 제공하며 팬덤과의 소통을 이어갔고, 이는 DLC 없이도 화제성을 유지하는 핵심 동력이 됐습니다.","links":[{"title":"Baldur's Gate 3 Has Sold Over 20 Million Units","url":"https://www.vgchartz.com/article/466573/baldurs-gate-3-has-sold-over-20-million-units/","source":"VGChartz"},{"title":"Baldur's Gate 3 - Steam Charts","url":"https://steamcharts.com/app/1086940","source":"SteamCharts"},{"title":"발더스 게이트 3 \"DLC나 후속작 개발 안 한다\"","url":"https://www.gamemeca.com/view.php?gid=1746982","source":"게임메카"}]},{"date":"2026-07-13","game":"팰월드 (Palworld)","hook":"2년의 얼리액세스를 마치고 7월 10일 1.0 정식 출시, 스팀 동시접속자 85만 명을 돌파하며 국내외에서 가장 뜨거운 화제를 모으고 있는 생존·수집 하이브리드작입니다.","coreLoop":"탐험 → 팰 포획(팰 스피어 투척) → 베이스에 팰 배치·자동 노동 → 장비·시설 제작 → 보스·타워 레이드 도전 → 강화된 장비로 더 넓은 지역 탐험, 이 순환이 반복됩니다. 포켓몬처럼 생물을 수집하지만 전투는 총기·근접무기를 직접 조작하는 액션 슈터 방식이라, '수집 → 전투'와 '수집 → 노동력 투입'이라는 두 갈래 루프가 동시에 굴러가는 게 특징입니다.","growthCurve":"성장 축이 3중으로 설계되어 있습니다: (1) 플레이어 레벨(체력·스태미나·장비 슬롯), (2) 팰 레벨·개체값(전투·노동 효율), (3) 기술 트리(테크 포인트로 해금하는 무기·시설). 초반에는 소수의 만능형 팰로 채집을 자동화하는 데 집중하게 하고, 중반부터는 속성 상성(전기·화염·수속 등)에 맞춰 팰을 특화 배치해야 노동 효율이 급격히 오르도록 곡선을 짜서 '아무 팰이나 잡아도 되는 시기'와 '조합을 고민해야 하는 시기'를 명확히 나눕니다. 보스·타워 레이드는 난이도가 계단식으로 뛰어, 파밍 구간과 도전 구간을 번갈아 배치해 페이스를 조절합니다.","funMechanics":"가장 큰 재미의 원천은 '귀여운 크리처가 총을 들고, 컨베이어벨트에서 노동한다'는 부조화의 웃음 포인트입니다. 여기에 팩토리 자동화 게임 특유의 '시스템이 스스로 굴러가는 쾌감'과 크리처 수집·육성의 '내 팰을 키운다'는 애착이 결합됩니다. 총기 기반 액션 전투가 기존 크리처 수집 장르에 없던 속도감을 더하고, 협동 멀티플레이에서는 역할 분담(베이스 관리 vs 탐험)이 자연스럽게 생겨 사회적 재미까지 확장됩니다.","benchmarks":"① 서로 다른 장르(수집·생존·팩토리·슈터)를 하나의 루프 안에 자연스럽게 녹여낸 설계. ② '포켓몬 표절' 논란을 정면 대응하지 않고 화제성으로 흡수한 커뮤니케이션 전략. ③ 2년간 얼리액세스 동안 커뮤니티 피드백을 빠르게 반영하며 신뢰를 쌓은 라이브 서비스 운영. ④ 엑스박스 게임패스 데이원 입점으로 초기 유저 볼륨을 확보하고, 정식 출시 시점에 가격을 올리지 않아(29.99달러 유지) '보답'이라는 메시지로 커뮤니티 호감을 재확인한 점도 눈여겨볼 만합니다.","businessModel":"완전 프리미엄(원타임 구매, 부분유료 가챠·광고 없음) 모델을 유지하며 가격은 1.0 출시 이후에도 29.99달러로 동결했습니다. 수익원은 ① 본편 패키지 판매 ② 엑스박스 게임패스 입점을 통한 구독 매출 배분 ③ 향후 코스메틱 등 유료 DLC ④ IP 확장(실물 카드게임, 스핀오프작 발표)입니다. 광고성 부분유료화 대신 '가격 동결'과 'IP 확장'으로 장기 수익을 도모하는 방향이 특징입니다.","onboarding":"튜토리얼은 최소한으로 유지하고, 첫 팰 포획과 베이스 건설을 15분 내 자연스럽게 경험하게 유도합니다. 무기 제작과 자동화 시스템은 진행하며 하나씩 해금되는 방식이라 초반 정보 과부하가 적고, '일단 해보면 이해되는' 직관적 UI가 학습 곡선을 완만하게 만듭니다. 다만 후반 조합형 팰 배치나 레이드 준비는 위키·커뮤니티 공략 의존도가 높아, 자체 학습만으로는 벽을 느끼는 유저도 존재합니다.","targetUser":"'포켓몬을 좋아했지만 더 성인 취향의 자유도를 원하는' 20~30대 코어 게이머를 1차 타겟으로 하면서도, 팩토리·자동화 게임 팬(팩토리오 등)과 생존 크래프팅 팬(아크, 발헤임)까지 포괄하는 크로스오버 포지셔닝을 취합니다. 크리처 수집이라는 친숙한 프레임으로 진입 장벽을 낮추면서도, 총기·생존 요소로 '더 자유롭고 폭력적인 대안'이라는 차별화된 자리를 확보했습니다.","community":"전용 서버 호스팅과 다인 협동 플레이를 지원해 친구·길드 단위의 자생적 커뮤니티가 형성되기 쉽습니다. 팰 도감 완성이나 희귀 팰 교환 같은 수집 요소가 디스코드·레딧 등 외부 커뮤니티에서 자발적 정보 공유를 유도하고, 개발사가 로드맵·패치노트를 커뮤니티에 직접 공개하며 소통하는 방식이 팬덤의 신뢰와 화제 유지에 기여하고 있습니다.","links":[{"title":"'팰월드' 정식 출시 스팀 동접 85만 '괴력', 크래프톤 모바일 버전 기대감 상승","url":"https://www.khgames.co.kr/news/articleView.html?idxno=306296","source":"경향게임스"},{"title":"'팰월드', 2년간 얼리 액세스 마치고 1.0 정식 출시","url":"https://www.khgames.co.kr/news/articleView.html?idxno=306273","source":"경향게임스"},{"title":"Palworld Won't Raise Its Price Following 1.0 Launch","url":"https://www.gamespot.com/articles/palworld-wont-raise-its-price-following-1-0-launch/","source":"GameSpot"},{"title":"Palworld 1.0 Launches July 10: Wing Pack, World Tree, Free for Existing Players","url":"https://www.techtimes.com/articles/319440/20260701/palworld-10-launches-july-10-wing-pack-world-tree-free-existing-players.htm","source":"Tech Times"}]}]</script>

    <button class="tab-btn" type="button" data-tab="analysis" role="tab" aria-selected="false">게임 분석</button>
  </nav>
</header>

<main>
  <section id="view-news" class="view">
    <div class="news-toolbar">
      <select id="day-select" class="day-select mono" aria-label="날짜 선택"></select>
    </div>
    <div class="timeline" id="timeline"></div>
    <div class="empty-state" id="empty-state" hidden>아직 수집된 브리핑이 없습니다.</div>
  </section>

  <section id="view-calendar" class="view" hidden>
    <div class="cal-header">
      <button class="cal-nav-btn" type="button" id="cal-prev" aria-label="이전 달">‹</button>
      <h2 class="cal-title mono" id="cal-title">–</h2>
      <button class="cal-nav-btn" type="button" id="cal-next" aria-label="다음 달">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend">
      <span><span class="cal-legend-dot" style="background:var(--accent)"></span>정식 출시</span>
      <span><span class="cal-legend-dot" style="background:var(--wire-industry)"></span>업데이트 · 오픈</span>
      <span><span class="cal-legend-dot" style="background:var(--beta)"></span>CBT · OBT · 베타</span>
    </div>
  </section>

  <section id="view-analysis" class="view" hidden>
    <div class="news-toolbar">
      <select id="analysis-select" class="day-select mono" aria-label="분석 게임 선택"></select>
    </div>
    <div id="analysis-content"></div>
    <div class="empty-state" id="analysis-empty" hidden>아직 등록된 심층 분석이 없습니다.</div>
  </section>
</main>

<footer>매일 오전 자동 수집 · 게임 업계 동향과 신작 소식</footer>

<script>
  (function () {
    var entries = [];
    try { entries = JSON.parse(document.getElementById('dispatch-data').textContent) || []; } catch (e) { entries = []; }
    entries.sort(function (a, b) { return a.date < b.date ? 1 : -1; });

    var releases = [];
    try { releases = JSON.parse(document.getElementById('release-data').textContent) || []; } catch (e) { releases = []; }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : s;
      return d.innerHTML;
    }

    function fmtDate(iso) {
      var parts = iso.split('-');
      if (parts.length !== 3) return iso;
      return parts[0] + '.' + parts[1] + '.' + parts[2];
    }

    /* ---- tabs ---- */
    var tabBtns = document.querySelectorAll('.tab-btn');
    var views = { news: document.getElementById('view-news'), calendar: document.getElementById('view-calendar'), analysis: document.getElementById('view-analysis') };
    tabBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        tabBtns.forEach(function (b) {
          b.classList.toggle('active', b === btn);
          b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
        });
        Object.keys(views).forEach(function (key) { views[key].hidden = key !== btn.dataset.tab; });
      });
    });

    /* ---- news view ---- */
    var timeline = document.getElementById('timeline');
    var emptyState = document.getElementById('empty-state');
    var statCount = document.getElementById('stat-count');
    var daySelect = document.getElementById('day-select');

    function renderStory(story) {
      var title = story.url
        ? '<a href="' + esc(story.url) + '" target="_blank" rel="noopener">' + esc(story.title) + '</a>'
        : esc(story.title);
      var source = story.source ? '<div class="story-source mono">' + esc(story.source) + '</div>' : '';
      return (
        '<div class="story">' +
          '<h3 class="story-title">' + title + '</h3>' +
          '<p class="story-blurb">' + esc(story.blurb) + '</p>' +
          source +
        '</div>'
      );
    }

    function renderGroup(label, className, stories) {
      if (!stories || !stories.length) return '';
      var items = stories.map(renderStory).join('');
      return (
        '<div class="wire-group">' +
          '<span class="wire-label ' + className + '">' + esc(label) + '</span>' +
          '<div class="story-list">' + items + '</div>' +
        '</div>'
      );
    }

    function renderDay(entry) {
      var groups = renderGroup('업계 동향', 'industry', entry.industry) +
                   renderGroup('신작 소식', 'release', entry.games);
      return (
        '<section class="day">' +
          '<h2 class="day-date mono">' + fmtDate(entry.date) + '</h2>' +
          (entry.lede ? '<p class="day-lede">' + esc(entry.lede) + '</p>' : '') +
          '<div class="day-groups">' + groups + '</div>' +
        '</section>'
      );
    }

    function renderSelection() {
      var val = daySelect.value;
      var shown = val === 'all' ? entries : entries.filter(function (e) { return e.date === val; });
      timeline.innerHTML = shown.map(renderDay).join('');
    }

    if (!entries.length) {
      emptyState.hidden = false;
      statCount.textContent = '0';
      daySelect.hidden = true;
    } else {
      emptyState.hidden = true;
      statCount.textContent = String(entries.length);
      var newest = entries[0].date;
      document.title = '게임 업계 뉴스 브리핑 · ' + fmtDate(newest);

      var options = '<option value="all">전체 보기</option>' + entries.map(function (entry, i) {
        return '<option value="' + esc(entry.date) + '">' + fmtDate(entry.date) + (i === 0 ? ' (최신)' : '') + '</option>';
      }).join('');
      daySelect.innerHTML = options;
      daySelect.value = newest;
      daySelect.addEventListener('change', renderSelection);

      renderSelection();
    }

    /* ---- calendar view ---- */
    var calGrid = document.getElementById('cal-grid');
    var calTitle = document.getElementById('cal-title');
    var calPrev = document.getElementById('cal-prev');
    var calNext = document.getElementById('cal-next');

    var releasesByDate = {};
    releases.forEach(function (r) {
      if (!r || !r.date) return;
      (releasesByDate[r.date] = releasesByDate[r.date] || []).push(r);
    });

    function typeClass(type) {
      if (['CBT', 'OBT', '베타', '얼리엑세스'].indexOf(type) !== -1) return 'type-beta';
      if (['업데이트', '오픈'].indexOf(type) !== -1) return 'type-update';
      return '';
    }

    var today = new Date();
    var viewYear = today.getFullYear();
    var viewMonth = today.getMonth();

    var WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];

    function pad2(n) { return n < 10 ? '0' + n : String(n); }

    function renderCalendar() {
      calTitle.textContent = viewYear + '.' + pad2(viewMonth + 1);

      var firstOfMonth = new Date(viewYear, viewMonth, 1);
      var startOffset = firstOfMonth.getDay();
      var gridStart = new Date(viewYear, viewMonth, 1 - startOffset);

      var todayKey = today.getFullYear() + '-' + pad2(today.getMonth() + 1) + '-' + pad2(today.getDate());

      var cells = WEEKDAYS.map(function (w) { return '<div class="cal-weekday">' + w + '</div>'; });

      for (var i = 0; i < 42; i++) {
        var d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
        var key = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
        var isOut = d.getMonth() !== viewMonth;
        var isToday = key === todayKey;
        var dayReleases = releasesByDate[key] || [];

        var events = dayReleases.map(function (r) {
          var cls = typeClass(r.type);
          var label = esc(r.title);
          return r.url
            ? '<a class="cal-event ' + cls + '" href="' + esc(r.url) + '" target="_blank" rel="noopener" title="' + esc(r.title + (r.type ? ' · ' + r.type : '')) + '">' + label + '</a>'
            : '<span class="cal-event ' + cls + '" title="' + esc(r.title) + '">' + label + '</span>';
        }).join('');

        cells.push(
          '<div class="cal-cell' + (isOut ? ' out' : '') + (isToday ? ' today' : '') + '">' +
            '<span class="cal-daynum mono">' + d.getDate() + '</span>' +
            events +
          '</div>'
        );
      }

      calGrid.innerHTML = cells.join('');
    }

    calPrev.addEventListener('click', function () {
      viewMonth -= 1;
      if (viewMonth < 0) { viewMonth = 11; viewYear -= 1; }
      renderCalendar();
    });
    calNext.addEventListener('click', function () {
      viewMonth += 1;
      if (viewMonth > 11) { viewMonth = 0; viewYear += 1; }
      renderCalendar();
    });

    renderCalendar();

    /* ---- analysis view ---- */
    var analyses = [];
    try { analyses = JSON.parse(document.getElementById('analysis-data').textContent) || []; } catch (e) { analyses = []; }
    analyses.sort(function (a, b) { return a.date < b.date ? 1 : -1; });

    var analysisSelect = document.getElementById('analysis-select');
    var analysisContent = document.getElementById('analysis-content');
    var analysisEmpty = document.getElementById('analysis-empty');

    var ANALYSIS_SECTIONS = [
      { key: 'coreLoop', label: '코어 루프' },
      { key: 'growthCurve', label: '성장 · 밸런싱 곡선' },
      { key: 'funMechanics', label: '재미를 만드는 핵심 장치' },
      { key: 'benchmarks', label: '기획자로서 벤치마킹할 점' },
      { key: 'businessModel', label: '수익 구조' },
      { key: 'onboarding', label: '온보딩 · 학습 곡선' },
      { key: 'targetUser', label: '타겟 유저 · 포지셔닝' },
      { key: 'community', label: '소셜 · 커뮤니티 장치' }
    ];

    function renderAnalysis(item) {
      var sections = ANALYSIS_SECTIONS.map(function (s, i) {
        if (!item[s.key]) return '';
        return (
          '<div class="analysis-section">' +
            '<h3 class="analysis-section-title"><span class="analysis-section-num">' + (i + 1) + '</span>' + esc(s.label) + '</h3>' +
            '<p class="analysis-section-body">' + esc(item[s.key]) + '</p>' +
          '</div>'
        );
      }).join('');

      var links = (item.links || []).map(function (l) {
        var title = l.url
          ? '<a href="' + esc(l.url) + '" target="_blank" rel="noopener">' + esc(l.title) + '</a>'
          : esc(l.title);
        var source = l.source ? '<span class="analysis-link-source mono">' + esc(l.source) + '</span>' : '';
        return '<div class="analysis-link">' + title + source + '</div>';
      }).join('');

      analysisContent.innerHTML =
        '<h2 class="analysis-game">' + esc(item.game) + '</h2>' +
        (item.hook ? '<p class="analysis-hook">' + esc(item.hook) + '</p>' : '') +
        '<div class="analysis-sections">' + sections + '</div>' +
        (links ? '<div class="analysis-links"><div class="analysis-links-title">관련 뉴스 · 자료</div><div class="analysis-link-list">' + links + '</div></div>' : '');
    }

    function renderAnalysisSelection() {
      var val = analysisSelect.value;
      var item = analyses.filter(function (a) { return (a.game + '|' + a.date) === val; })[0];
      if (item) renderAnalysis(item);
    }

    if (!analyses.length) {
      analysisEmpty.hidden = false;
      analysisSelect.hidden = true;
    } else {
      analysisEmpty.hidden = true;
      var analysisOptions = analyses.map(function (a, i) {
        var key = a.game + '|' + a.date;
        return '<option value="' + esc(key) + '">' + esc(a.game) + ' (' + fmtDate(a.date) + ')' + (i === 0 ? ' · 최신' : '') + '</option>';
      }).join('');
      analysisSelect.innerHTML = analysisOptions;
      analysisSelect.addEventListener('change', renderAnalysisSelection);
      renderAnalysisSelection();
    }
  })();
</script>
