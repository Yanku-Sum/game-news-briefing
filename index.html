<script>
  (function () {
    var raw = document.getElementById('dispatch-data').textContent;
    var entries = [];
    try { entries = JSON.parse(raw) || []; } catch (e) { entries = []; }
    entries.sort(function (a, b) { return a.date < b.date ? 1 : -1; });

    var timeline = document.getElementById('timeline');
    var emptyState = document.getElementById('empty-state');
    var statCount = document.getElementById('stat-count');
    var daySelect = document.getElementById('day-select');

    function fmtDate(iso) {
      var parts = iso.split('-');
      if (parts.length !== 3) return iso;
      return parts[0] + '.' + parts[1] + '.' + parts[2];
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : s;
      return d.innerHTML;
    }

    function renderStory(story) {
      var title = story.url
        ? '<a href="' + esc(story.url) + '" target="_blank" rel="noopener">' + esc(story.title) + '</a>'
        : esc(story.title);
      var source = story.source ? '<div class="story-source mono">' + esc(story.source) + '</div>' : '';
      return (
        '<div class="story">' +
          '<h3 class="story-title">' + title + '</h3>' +
          '<p class="story-blurb">' + esc(story.blurb) + '</p>' +
          source +
        '</div>'
      );
    }

    function renderGroup(label, className, stories) {
      if (!stories || !stories.length) return '';
      var items = stories.map(renderStory).join('');
      return (
        '<div class="wire-group">' +
          '<span class="wire-label ' + className + '">' + esc(label) + '</span>' +
          '<div class="story-list">' + items + '</div>' +
        '</div>'
      );
    }

    function renderDay(entry) {
      var groups = renderGroup('업계 동향', 'industry', entry.industry) +
                   renderGroup('신작 소식', 'release', entry.games);
      return (
        '<section class="day">' +
          '<h2 class="day-date mono">' + fmtDate(entry.date) + '</h2>' +
          (entry.lede ? '<p class="day-lede">' + esc(entry.lede) + '</p>' : '') +
          '<div class="day-groups">' + groups + '</div>' +
        '</section>'
      );
    }

    function renderSelection() {
      var val = daySelect.value;
      var shown = val === 'all' ? entries : entries.filter(function (e) { return e.date === val; });
      timeline.innerHTML = shown.map(renderDay).join('');
    }

    if (!entries.length) {
      emptyState.hidden = false;
      statCount.textContent = '0';
      daySelect.hidden = true;
    } else {
      emptyState.hidden = true;
      statCount.textContent = String(entries.length);
      var newest = entries[0].date;
      document.title = '게임 업계 뉴스 브리핑 · ' + fmtDate(newest);

      var options = '<option value="all">전체 보기</option>' + entries.map(function (entry, i) {
        return '<option value="' + esc(entry.date) + '">' + fmtDate(entry.date) + (i === 0 ? ' (최신)' : '') + '</option>';
      }).join('');
      daySelect.innerHTML = options;
      daySelect.value = newest;
      daySelect.addEventListener('change', renderSelection);

      renderSelection();
    }
  })();
</script>
